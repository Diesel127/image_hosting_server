events {
    # Maximum number of simultaneous connections per worker.
    worker_connections 1024;
}

http {
    # Standard MIME type file so Nginx can set Content-Type correctly.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Simple upstream pointing to the Python app container.
    upstream app {
        server app:8000;
    }

    server {
        # Public HTTP port for the reverse proxy.
        listen 8080;
        # Allow larger uploads (the app expects up to ~5MB images).
        client_max_body_size 100M;

        location /images/ {
            # Serve uploaded files directly from a mounted host directory.
            alias /images/;
            # Cache aggressively because stored images are immutable in practice.
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /static/ {
            # Serve frontend static assets (css/js) from the app image.
            alias /app/src/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            # Everything else (/, /upload, /images-list, /api/images) is proxied
            # to the Python HTTP server running in the `app` container.
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
